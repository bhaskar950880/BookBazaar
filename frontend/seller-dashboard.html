<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Seller Dashboard</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>


    <div class="dashboard-layout">


        <!-- SIDEBAR -->

        <div class="sidebar">

            <h2 class="sidebar-logo">

                BookBazaar

            </h2>


            <ul class="sidebar-menu">

                <li>

                    <a href="#">

                        Dashboard

                    </a>

                </li>

                <li>

                    <a href="#addBookSection">

                        Add Book

                    </a>

                </li>

                <li>

                    <a href="#myBooksSection">

                        My Books

                    </a>

                </li>

                <li>

                    <a href="books.html">

                        View Store

                    </a>

                </li>

                <li>

                    <a href="#"
                        onclick="logout()">

                        Logout

                    </a>

                </li>

            </ul>

        </div>



        <!-- MAIN CONTENT -->

        <div class="dashboard-main">


            <!-- TOPBAR -->

            <div class="dashboard-topbar">

                <h2>

                    Seller Dashboard

                </h2>

            </div>



            <!-- STATS -->

            <div class="row g-4 mt-2">


                <div class="col-md-4">

                    <div class="stats-card">

                        <h3 id="totalBooks">

                            0

                        </h3>

                        <p>

                            Total Books

                        </p>

                    </div>

                </div>



                <div class="col-md-4">

                    <div class="stats-card">

                        <h3 id="totalOrders">

                            0

                        </h3>

                        <p>

                            Orders

                        </p>

                    </div>

                </div>



                <div class="col-md-4">

                    <div class="stats-card">

                        <h3 id="totalRevenue">

                            ₹0

                        </h3>

                        <p>

                            Revenue

                        </p>

                    </div>

                </div>

            </div>



            <!-- ADD BOOK -->

            <div class="dashboard-card mt-5"
                id="addBookSection">

                <h3 class="mb-4">

                    Add New Book

                </h3>


                <form id="bookForm">

                    <div class="row">


                        <div class="col-md-6 mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="title"
                                placeholder="Book Title"
                                required>

                        </div>



                        <div class="col-md-6 mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="author"
                                placeholder="Author Name"
                                required>

                        </div>



                        <div class="col-md-6 mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="category"
                                placeholder="Category"
                                required>

                        </div>



                        <div class="col-md-6 mb-3">

                            <input
                                type="number"
                                class="form-control"
                                id="price"
                                placeholder="Price"
                                required>

                        </div>



                        <div class="col-md-6 mb-3">

                            <input
                                type="number"
                                class="form-control"
                                id="stock"
                                placeholder="Stock"
                                required>

                        </div>



                        <div class="col-md-6 mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="image"
                                placeholder="Image URL"
                                required>

                        </div>



                        <div class="col-12 mb-3">

                            <textarea
                                class="form-control"
                                id="description"
                                rows="4"
                                placeholder="Description"
                                required>

                            </textarea>

                        </div>



                        <div class="col-12">

                            <button
                                class="btn btn-primary">

                                Add Book

                            </button>

                        </div>

                    </div>

                </form>

            </div>



            <!-- MY BOOKS -->

            <div class="mt-5"
                id="myBooksSection">

                <h3 class="mb-4">

                    My Books

                </h3>


                <div class="row g-4"
                    id="sellerBooks">

                </div>

            </div>

        </div>

    </div>



    <!-- JS -->

    <script src="js/seller.js"></script>

</body>

</html>
