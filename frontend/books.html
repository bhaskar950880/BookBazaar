<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Books</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>


    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                BookBazaar

            </a>


            <!-- SEARCH -->

            <form class="d-flex search-box"
                id="searchForm">

                <input
                    class="form-control search-input"
                    type="search"
                    id="searchInput"
                    placeholder="Search books...">

                <button class="btn search-btn">

                    Search

                </button>

            </form>


            <div id="navButtons">

            </div>

        </div>

    </nav>



    <!-- MAIN -->

    <section class="container-fluid mt-4">

        <div class="row">


            <!-- SIDEBAR -->

            <div class="col-md-3">


                <div class="filter-card">

                    <h4>

                        Filters

                    </h4>

                    <hr>


                    <!-- CATEGORY -->

                    <h5>

                        Category

                    </h5>


                    <div class="form-check">

                        <input
                            class="form-check-input categoryFilter"
                            type="radio"
                            name="category"
                            value="">

                        <label class="form-check-label">

                            All

                        </label>

                    </div>



                    <div class="form-check">

                        <input
                            class="form-check-input categoryFilter"
                            type="radio"
                            name="category"
                            value="Programming">

                        <label class="form-check-label">

                            Programming

                        </label>

                    </div>



                    <div class="form-check">

                        <input
                            class="form-check-input categoryFilter"
                            type="radio"
                            name="category"
                            value="Self Help">

                        <label class="form-check-label">

                            Self Help

                        </label>

                    </div>



                    <div class="form-check">

                        <input
                            class="form-check-input categoryFilter"
                            type="radio"
                            name="category"
                            value="Education">

                        <label class="form-check-label">

                            Education

                        </label>

                    </div>



                    <div class="form-check">

                        <input
                            class="form-check-input categoryFilter"
                            type="radio"
                            name="category"
                            value="Fiction">

                        <label class="form-check-label">

                            Fiction

                        </label>

                    </div>



                    <hr>


                    <!-- PRICE -->

                    <h5>

                        Max Price

                    </h5>

                    <input
                        type="range"
                        min="100"
                        max="5000"
                        value="5000"
                        class="form-range"
                        id="priceRange">


                    <p>

                        ₹
                        <span id="priceValue">

                            5000

                        </span>

                    </p>

                </div>

            </div>



            <!-- BOOKS -->

            <div class="col-md-9">

                <div class="row g-4"
                    id="booksContainer">

                </div>

            </div>

        </div>

    </section>



    <!-- JS -->

    <script src="js/main.js"></script>

    <script src="js/books.js"></script>

</body>

</html>
