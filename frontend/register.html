<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register - BookBazaar</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>


    <!-- NAVBAR -->

    <nav class="navbar navbar-dark custom-navbar">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                BookBazaar

            </a>

        </div>

    </nav>



    <!-- REGISTER SECTION -->

    <section class="login-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-md-5">

                    <div class="login-card">

                        <h2 class="text-center mb-4">

                            Create Account

                        </h2>


                        <form id="registerForm">


                            <!-- NAME -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                    required>

                            </div>



                            <!-- EMAIL -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    required>

                            </div>



                            <!-- PASSWORD -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    required>

                            </div>



                            <!-- ROLE -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Select Role

                                </label>

                                <select
                                    class="form-select"
                                    id="role">

                                    <option value="buyer">

                                        Buyer

                                    </option>

                                    <option value="seller">

                                        Seller

                                    </option>

                                </select>

                            </div>



                            <!-- BUTTON -->

                            <button
                                type="submit"
                                class="btn btn-primary w-100">

                                Register

                            </button>

                        </form>


                        <p class="mt-3 text-center">

                            Already have an account?

                            <a href="login.html">

                                Login

                            </a>

                        </p>


                        <!-- MESSAGE -->

                        <p id="message"
                            class="text-center mt-3">

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </section>



    <!-- JS -->

    <script src="js/auth.js"></script>

</body>

</html>
