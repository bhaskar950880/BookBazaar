<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>


    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                BookBazaar

            </a>

        </div>

    </nav>



    <!-- CHECKOUT -->

    <section class="container mt-5">

        <div class="row">


            <!-- ADDRESS -->

            <div class="col-md-7">

                <div class="checkout-card">

                    <h3 class="mb-4">

                        Delivery Address

                    </h3>


                    <form id="checkoutForm">


                        <div class="mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="fullName"
                                placeholder="Full Name"
                                required>

                        </div>



                        <div class="mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="phone"
                                placeholder="Phone Number"
                                required>

                        </div>



                        <div class="mb-3">

                            <textarea
                                class="form-control"
                                id="address"
                                rows="4"
                                placeholder="Full Address"
                                required>

                            </textarea>

                        </div>



                        <div class="mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="city"
                                placeholder="City"
                                required>

                        </div>



                        <div class="mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="pincode"
                                placeholder="Pincode"
                                required>

                        </div>



                        <button
                            class="btn btn-primary btn-lg w-100">

                            Place Order

                        </button>

                    </form>

                </div>

            </div>



            <!-- SUMMARY -->

            <div class="col-md-5">

                <div class="summary-card">

                    <h4>

                        Order Summary

                    </h4>

                    <hr>

                    <div id="checkoutItems">

                    </div>

                    <hr>

                    <h4 id="checkoutTotal">

                        Total: ₹0

                    </h4>

                </div>

            </div>

        </div>

    </section>



    <!-- JS -->

    <script src="js/checkout.js"></script>

</body>

</html>
