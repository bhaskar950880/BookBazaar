<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Book Details</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>


    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                BookBazaar

            </a>


            <div id="navButtons">

            </div>

        </div>

    </nav>



    <!-- BOOK DETAILS -->

    <section class="container mt-5">

        <div class="row">


            <!-- IMAGE -->

            <div class="col-md-5">

                <div class="details-image-box">

                    <img
                        id="bookImage"
                        class="details-image">

                </div>

            </div>



            <!-- INFO -->

            <div class="col-md-7">

                <div class="details-card">

                    <h2 id="bookTitle">

                    </h2>

                    <p class="details-author"
                        id="bookAuthor">

                    </p>

                    <div class="rating-box mb-3">

                        ⭐ 4.8

                    </div>

                    <h3 class="details-price"
                        id="bookPrice">

                    </h3>

                    <p id="bookDescription">

                    </p>


                    <h6 class="mt-4">

                        Stock:
                        <span id="bookStock">

                        </span>

                    </h6>


                    <button
                        class="btn btn-primary btn-lg mt-4"
                        id="addCartBtn">

                        Add To Cart

                    </button>

                </div>

            </div>

        </div>

    </section>



    <!-- JS -->

    <script src="js/main.js"></script>

    <script src="js/book-details.js"></script>

</body>

</html>
