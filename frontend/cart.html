<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Cart - BookBazaar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>


    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                BookBazaar

            </a>


            <div>

                <a href="books.html"
                    class="btn btn-light me-2">

                    Books

                </a>

                <a href="cart.html"
                    class="btn btn-warning">

                    Cart

                </a>

            </div>

        </div>

    </nav>



    <!-- CART SECTION -->

    <section class="container mt-5">

        <h2 class="section-title mb-4">

            My Cart

        </h2>


        <div class="row">

            <!-- CART ITEMS -->

            <div class="col-md-8">

                <div id="cartItems">

                </div>

            </div>



            <!-- SUMMARY -->

            <div class="col-md-4">

                <div class="summary-card">

                    <h4>

                        Price Details

                    </h4>

                    <hr>

                    <h5 id="totalPrice">

                        Total: ₹0

                    </h5>

                    <a href="checkout.html"
                        class="btn btn-primary w-100 mt-3">

                        Proceed To Checkout

                    </a>

                </div>

            </div>

        </div>

    </section>



    <script src="js/cart.js"></script>

</body>

</html>
